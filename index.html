    (function(){
        const canvas = document.getElementById('strawberryCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 850;
        canvas.height = 760;
        
        // 清空画布为白色背景
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // ========== Turtle 模拟器 ==========
        // 维护当前状态
        let currentX = 0, currentY = 0;
        let currentHeading = 0; // 0=向右, 90=向上, 等等
        let penDown = true;
        let currentPenSize = 1;
        let currentPenColor = "#000000";
        let currentFillColor = "#000000";
        let isFilling = false;
        let fillPath = []; // 存储填充路径的点
        
        // 开始新路径
        function beginPath() {
            if (isFilling) {
                fillPath = [];
            }
            ctx.beginPath();
            ctx.moveTo(currentX, currentY);
        }
        
        function moveTo(x, y) {
            currentX = x;
            currentY = y;
            ctx.moveTo(x, y);
        }
        
        function lineTo(x, y) {
            currentX = x;
            currentY = y;
            ctx.lineTo(x, y);
        }
        
        // 前进
        function fd(distance) {
            const rad = currentHeading * Math.PI / 180;
            const newX = currentX + distance * Math.cos(rad);
            const newY = currentY + distance * Math.sin(rad);
            if (penDown) {
                ctx.lineTo(newX, newY);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(newX, newY);
            } else {
                ctx.beginPath();
                ctx.moveTo(newX, newY);
            }
            currentX = newX;
            currentY = newY;
        }
        
        // 后退
        function bk(distance) {
            fd(-distance);
        }
        
        // 左转/右转
        function lt(angle) {
            currentHeading += angle;
        }
        
        function rt(angle) {
            currentHeading -= angle;
        }
        
        // 设置朝向
        function seth(angle) {
            currentHeading = angle;
        }
        
        // 画笔属性
        function pensize(size) {
            currentPenSize = size;
            ctx.lineWidth = size;
        }
        
        function pencolor(color) {
            currentPenColor = color;
            ctx.strokeStyle = color;
        }
        
        function fillcolor(color) {
            currentFillColor = color;
            ctx.fillStyle = color;
        }
        
        function color(strokeColor, fillColor) {
            pencolor(strokeColor);
            fillcolor(fillColor);
        }
        
        // 开始填充
        function begin_fill() {
            isFilling = true;
            fillPath = [{x: currentX, y: currentY}];
            ctx.beginPath();
            ctx.moveTo(currentX, currentY);
        }
        
        // 结束填充
        function end_fill() {
            if (fillPath.length > 0) {
                ctx.closePath();
                ctx.fillStyle = currentFillColor;
                ctx.fill();
                ctx.strokeStyle = currentPenColor;
                ctx.lineWidth = currentPenSize;
                ctx.stroke();
            }
            isFilling = false;
            fillPath = [];
            ctx.beginPath();
            ctx.moveTo(currentX, currentY);
        }
        
        // 画圆/弧线 (模拟 turtle 的 circle)
        // radius: 半径，正数为向左画，负数为向右画
        // extent: 角度，默认360
        function circle(radius, extent = 360) {
            // 计算圆心位置
            const centerX = currentX;
            const centerY = currentY - radius;
            // turtle 的 circle 起始方向是朝向当前朝向的左侧/右侧
            // 起始角度: 如果 radius > 0, 从 -90 度方向开始 (向上)
            // 这里简化处理，直接使用 arc
            const startAngle = -90 * Math.PI / 180;
            const endAngle = startAngle + (extent * Math.PI / 180);
            const anticlockwise = radius < 0;
            const absRadius = Math.abs(radius);
            
            ctx.arc(centerX, centerY, absRadius, startAngle, endAngle, anticlockwise);
            
            // 更新位置到弧线终点
            const endRad = startAngle + (extent * Math.PI / 180);
            currentX = centerX + absRadius * Math.cos(endRad);
            currentY = centerY + absRadius * Math.sin(endRad);
            ctx.lineTo(currentX, currentY);
        }
        
        // penup/pendown
        function penup() {
            penDown = false;
            ctx.beginPath();
        }
        
        function pendown() {
            penDown = true;
            ctx.beginPath();
            ctx.moveTo(currentX, currentY);
        }
        
        // goto 函数
        function goto(x, y) {
            if (penDown) {
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
            } else {
                ctx.beginPath();
                ctx.moveTo(x, y);
            }
            currentX = x;
            currentY = y;
        }
        
        // 设置点 (dot)

            const oldFill = ctx.fillStyle;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(currentX, currentY, size || currentPenSize/2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = oldFill;
            ctx.beginPath();
            ctx.moveTo(currentX, currentY);

        const mling_circle_list = [

                seth(0);
                color(colors[i]);

                pensize(2);

                end_fill();
                circleIndex++;
